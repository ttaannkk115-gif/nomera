<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VoltMaster Mobile</title>
    <style>
        /* Обнуляем отступы для полноэкранного режима */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Настройка контейнера для сайта */
        .web-container {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Индикатор загрузки (пока сайт подгружается) */
        .loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: Arial, sans-serif;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="loader">Загрузка VoltMaster...</div>

    <iframe 
        src="https://your-number.net/We0yNNBxlP" 
        class="web-container"
        allowfullscreen>
    </iframe>

    <script>
        // Код будет сохранен в памяти браузера согласно вашим настройкам
        console.log("VoltMaster: Интерфейс загружен.");
        
        // Простая проверка доступности фрейма
        window.addEventListener('load', () => {
            document.querySelector('.loader').style.display = 'none';
        });
    </script>
</body>
</html>
